name: Deploy Container App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/cal-com
  CONTAINER_APP_NAME: cal-com-container-web
  RESOURCE_GROUP: cal-com-rg

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tags
        id: image
        run: |
          IMAGE_NAME_LOWER="$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          echo "name=${IMAGE_NAME_LOWER}" >> "$GITHUB_OUTPUT"
          echo "sha=${IMAGE_NAME_LOWER}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest=${IMAGE_NAME_LOWER}:latest" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.sha }}
            ${{ steps.image.outputs.latest }}
          build-args: |
            NEXT_PUBLIC_WEBAPP_URL=https://calendar.wecallyourmom.com
            NEXT_PUBLIC_WEBSITE_URL=https://calendar.wecallyourmom.com
            NEXTAUTH_URL=https://calendar.wecallyourmom.com
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            CALENDSO_ENCRYPTION_KEY=${{ secrets.CALENDSO_ENCRYPTION_KEY }}

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure GHCR pull credentials
        uses: azure/CLI@v2
        env:
          GHCR_USERNAME: ${{ vars.GHCR_USERNAME || github.actor }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        with:
          inlineScript: |
            if [ -n "${GHCR_PULL_TOKEN}" ]; then
              az containerapp registry set \
                --name "${CONTAINER_APP_NAME}" \
                --resource-group "${RESOURCE_GROUP}" \
                --server ghcr.io \
                --username "${GHCR_USERNAME}" \
                --password "${GHCR_PULL_TOKEN}"
            else
              echo "GHCR_PULL_TOKEN is not set; assuming the GHCR package is public or registry credentials already exist."
            fi

      - name: Deploy to Azure Container Apps
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az containerapp update \
              --name "${CONTAINER_APP_NAME}" \
              --resource-group "${RESOURCE_GROUP}" \
              --image "${{ steps.image.outputs.sha }}"
