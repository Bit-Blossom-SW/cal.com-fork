[variables]
NODE_ENV = "production"
NODE_OPTIONS = "--max-old-space-size=8192"
# Speed up build
NEXT_TELEMETRY_DISABLED = "1"
DISABLE_ESLINT = "true"
# Environment variables are now set in Railway dashboard
# Remove these lines to use Railway env vars instead of hardcoded values

[phases.install]
cmds = ["yarn install --frozen-lockfile"]

[phases.build]
cmds = [
  "NODE_OPTIONS='--max-old-space-size=8192' yarn workspace @calcom/web build"
]

[start]
cmd = "yarn prisma migrate deploy && yarn workspace @calcom/web start"